<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#09090b"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#grad)" opacity="0.85"/>
  <!-- Shopping bag icon (centered, white) -->
  <g transform="translate(128, 112)" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- bag body -->
    <path d="M32 84 L40 280 A16 16 0 0 0 56 296 L200 296 A16 16 0 0 0 216 280 L224 84 Z"/>
    <!-- bag handle -->
    <path d="M96 84 A32 32 0 0 1 160 84"/>
    <!-- bag top opening -->
    <line x1="32" y1="84" x2="224" y2="84"/>
  </g>
</svg>
