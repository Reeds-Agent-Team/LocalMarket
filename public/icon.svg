<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Shopping bag: wide trapezoid body + curved handle on top -->
  <!-- Handle: arc above the bag, two arms coming down into bag top -->
  <path
    d="M 186 210 Q 186 150 256 150 Q 326 150 326 210"
    fill="none"
    stroke="white"
    stroke-width="28"
    stroke-linecap="round"
  />

  <!-- Bag body: rounded rectangle -->
  <rect x="155" y="205" width="202" height="170" rx="18" fill="white" opacity="0.95"/>

  <!-- Bag top edge line (where handle meets bag) -->
  <rect x="155" y="205" width="202" height="28" rx="18" fill="white"/>
</svg>
